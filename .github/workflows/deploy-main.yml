name: CI MG Arquitectura e Ingenieria - Deploy to DigitalOcean (master) V2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Check Node version
        run: |
          node -v
          npm -v

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BLUDCODE_SSH_KEY }}

      - name: Debug SSH
        run: |
          ssh -o StrictHostKeyChecking=no -T git@github.com || true
          git ls-remote git@github.com:mdamonte88/bludcode-landing-ui.git

      - name: Install dependencies
        run: npm ci

      - name: Patch bludcode-landing-ui
        run: |
          node tools/fixBludcodeLandingUiPaths.js
          npm --prefix node_modules/bludcode-landing-ui run build

      - name: Create missing SCSS files
        run: |
          mkdir -p node_modules/bludcode-landing-ui/src/styles/components

          cat > node_modules/bludcode-landing-ui/src/styles/components/navbarAluven.scss << 'EOF'
          @import './navbarCore.scss';
          EOF

          cat > node_modules/bludcode-landing-ui/src/styles/components/navbarTiburon.scss << 'EOF'
          @import './navbarCore.scss';
          EOF

      - name: Build React app
        run: npm run build

      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Test SSH to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            whoami
            hostname
            pwd

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "dist"
          target: /var/www/mgarquitectura.com

      - name: Reload PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            set -e
            cd /var/www/mgarquitectura.com
            pm2 delete mgarquitectura.com || true
            pm2 start npm --name "mgarquitectura.com" -- run open:dist
            pm2 save
